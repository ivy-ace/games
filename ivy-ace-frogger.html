<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ivy and Ace Frogger</title>
<style>
  :root {
    --bg: #12351e;
    --bg2: #1f6134;
    --panel: rgba(255, 255, 255, .13);
    --line: rgba(255, 255, 255, .24);
    --text: #f7fff8;
    --muted: #c7e3cf;
    --ivy: #ff8fc7;
    --ace: #55d6ff;
    --gold: #ffd35a;
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background:
      radial-gradient(circle at 22% 12%, rgba(255, 255, 255, .18), transparent 22rem),
      linear-gradient(135deg, var(--bg2), var(--bg));
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    touch-action: none;
    user-select: none;
  }

  .app {
    width: 100vw;
    height: 100vh;
    height: 100svh;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    gap: 6px;
    padding: max(7px, env(safe-area-inset-top)) 8px max(7px, env(safe-area-inset-bottom));
    overflow: hidden;
  }

  header,
  footer {
    width: min(1060px, 100%);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  header > div:first-child { min-width: 0; }

  h1 {
    margin: 0;
    font-size: clamp(18px, 3vw, 28px);
    line-height: 1.05;
  }

  .subtitle {
    margin-top: 2px;
    color: var(--muted);
    font-size: clamp(11px, 1.7vw, 14px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stats,
  .players,
  .controls,
  .pad {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stats {
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .stat {
    min-width: 68px;
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    text-align: center;
    backdrop-filter: blur(8px);
  }

  .stat span {
    display: block;
    color: var(--muted);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .stat strong {
    display: block;
    margin-top: 1px;
    font-size: 18px;
    line-height: 1;
  }

  .stage {
    position: relative;
    width: min(1060px, 100%);
    height: 100%;
    min-height: 0;
    margin: 0 auto;
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    background: #173d25;
    box-shadow: 0 18px 56px rgba(0, 0, 0, .25);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 12px;
    pointer-events: none;
  }

  .card {
    width: min(470px, 100%);
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(15, 39, 24, .82);
    backdrop-filter: blur(10px);
    padding: 14px;
    text-align: center;
    box-shadow: 0 16px 44px rgba(0, 0, 0, .28);
  }

  .card h2 {
    margin: 0 0 7px;
    font-size: clamp(24px, 5vw, 40px);
    line-height: 1;
  }

  .card p {
    margin: 0;
    color: var(--muted);
    font-size: clamp(13px, 2.3vw, 16px);
    line-height: 1.35;
  }

  button {
    appearance: none;
    min-height: 32px;
    border: 1px solid rgba(255, 255, 255, .25);
    border-radius: 8px;
    background: rgba(255, 255, 255, .13);
    color: var(--text);
    font: inherit;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    padding: 7px 10px;
  }

  button:hover {
    border-color: rgba(255, 255, 255, .55);
  }

  button.primary {
    border: 0;
    background: linear-gradient(135deg, #8ef07d, #f4e66b);
    color: #102413;
  }

  button.player.active[data-player="ivy"] {
    border-color: var(--ivy);
    box-shadow: 0 0 0 2px rgba(255, 143, 199, .22) inset;
  }

  button.player.active[data-player="ace"] {
    border-color: var(--ace);
    box-shadow: 0 0 0 2px rgba(85, 214, 255, .22) inset;
  }

  .difficulty {
    display: flex;
    gap: 4px;
    padding: 3px;
    border: 1px solid rgba(255, 255, 255, .16);
    border-radius: 8px;
    background: rgba(0, 0, 0, .12);
  }

  button.difficulty-btn {
    min-height: 28px;
    padding: 5px 8px;
  }

  button.difficulty-btn.active {
    border-color: var(--gold);
    background: rgba(255, 211, 90, .18);
    color: #fff7c2;
    box-shadow: 0 0 0 2px rgba(255, 211, 90, .14) inset;
  }

  .hint {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pad { display: none; }

  .pad-grid {
    display: grid;
    grid-template-columns: repeat(3, 42px);
    grid-template-rows: repeat(2, 32px);
    gap: 5px;
  }

  .pad-grid button {
    width: 42px;
    height: 32px;
    padding: 0;
    font-size: 12px;
  }

  .pad-grid .up { grid-column: 2; grid-row: 1; }
  .pad-grid .left { grid-column: 1; grid-row: 2; }
  .pad-grid .down { grid-column: 2; grid-row: 2; }
  .pad-grid .right { grid-column: 3; grid-row: 2; }

  @media (max-width: 760px) {
    .app { gap: 5px; padding-left: 6px; padding-right: 6px; }
    header { align-items: flex-start; }
    .subtitle,
    .hint { display: none; }
    .stat { min-width: 58px; padding: 5px 6px; }
    .stat strong { font-size: 16px; }
    .players { flex-wrap: wrap; justify-content: flex-end; }
    .difficulty { order: 5; }
    button { min-height: 30px; padding: 6px 8px; font-size: 12px; }
    button.difficulty-btn { min-height: 27px; padding: 4px 7px; }
    footer { align-items: flex-end; }
    .pad { display: flex; }
  }

  @media (max-height: 620px) {
    .app { gap: 4px; padding-top: 4px; padding-bottom: 4px; }
    h1 { font-size: clamp(16px, 2.6vw, 22px); }
    .subtitle,
    .hint { display: none; }
    .stage { box-shadow: none; }
    .stat { min-width: 58px; padding: 4px 6px; }
    .stat strong { font-size: 16px; }
    button { min-height: 29px; padding: 5px 8px; }
    .pad-grid {
      grid-template-columns: repeat(3, 38px);
      grid-template-rows: repeat(2, 29px);
    }
    .pad-grid button {
      width: 38px;
      height: 29px;
    }
  }

  @media (max-height: 460px) {
    .app { grid-template-rows: auto minmax(0, 1fr); }
    footer {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 6px;
      width: auto;
      max-width: none;
      z-index: 3;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(15, 39, 24, .68);
      backdrop-filter: blur(8px);
    }
  }
</style>
</head>
<body>
<main class="app" aria-label="Ivy and Ace Frogger game">
  <header>
    <div>
      <h1>Ivy and Ace Frogger</h1>
      <div class="subtitle">Hop across the road, ride the logs, and reach the lily pads.</div>
    </div>
    <div class="stats" aria-live="polite">
      <div class="stat"><span>Player</span><strong id="playerName">Ivy</strong></div>
      <div class="stat"><span>Mode</span><strong id="difficultyName">Easy</strong></div>
      <div class="stat"><span>Score</span><strong id="score">0</strong></div>
      <div class="stat"><span>Lives</span><strong id="lives">7</strong></div>
      <div class="stat"><span>Best</span><strong id="best">0</strong></div>
    </div>
  </header>

  <section class="stage" id="stage">
    <canvas id="game" aria-label="Frogger play field"></canvas>
    <div class="overlay" id="overlay">
      <div class="card">
        <h2 id="overlayTitle">Ready?</h2>
        <p id="overlayText">Pick Ivy or Ace, choose a difficulty, then press Start. Use arrow keys, WASD, swipes, or the buttons.</p>
      </div>
    </div>
  </section>

  <footer>
    <div class="players">
      <button class="player active" data-player="ivy" type="button">Ivy</button>
      <button class="player" data-player="ace" type="button">Ace</button>
      <div class="difficulty" aria-label="Difficulty">
        <button class="difficulty-btn active" data-difficulty="easy" type="button">Easy</button>
        <button class="difficulty-btn" data-difficulty="normal" type="button">Normal</button>
        <button class="difficulty-btn" data-difficulty="hard" type="button">Hard</button>
      </div>
      <button class="primary" id="startBtn" type="button">Start</button>
      <button id="pauseBtn" type="button">Pause</button>
    </div>
    <div class="hint">Move one hop at a time. Bonus points for getting home fast.</div>
    <div class="pad" aria-label="Touch controls">
      <div class="pad-grid">
        <button class="up" data-move="up" type="button">Up</button>
        <button class="left" data-move="left" type="button">Left</button>
        <button class="down" data-move="down" type="button">Down</button>
        <button class="right" data-move="right" type="button">Right</button>
      </div>
    </div>
  </footer>
</main>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const playerName = document.getElementById('playerName');
  const difficultyName = document.getElementById('difficultyName');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const bestEl = document.getElementById('best');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const playerButtons = Array.from(document.querySelectorAll('.player'));
  const difficultyButtons = Array.from(document.querySelectorAll('.difficulty-btn'));

  const cols = 13;
  const rows = 14;
  const profiles = {
    ivy: { name: 'Ivy', body: '#ff8fc7', belly: '#ffe4f1', cheek: '#ff5faa', stripe: '#e84f9f' },
    ace: { name: 'Ace', body: '#55d6ff', belly: '#d7f6ff', cheek: '#229bd0', stripe: '#1fa7d8' }
  };

  const difficulties = {
    easy: {
      name: 'Easy',
      lives: 7,
      speed: .48,
      roadGap: 1.55,
      logGap: .55,
      carWidth: .72,
      logWidth: 1.65,
      carHitbox: .42,
      logCatch: .38,
      edgeForgiveness: .28,
      levelSpeed: .04,
      score: .75
    },
    normal: {
      name: 'Normal',
      lives: 4,
      speed: .78,
      roadGap: 1.22,
      logGap: .78,
      carWidth: .86,
      logWidth: 1.28,
      carHitbox: .5,
      logCatch: .44,
      edgeForgiveness: .18,
      levelSpeed: .07,
      score: 1
    },
    hard: {
      name: 'Hard',
      lives: 3,
      speed: 1,
      roadGap: 1.04,
      logGap: .96,
      carWidth: 1,
      logWidth: 1.05,
      carHitbox: .58,
      logCatch: .5,
      edgeForgiveness: .1,
      levelSpeed: .1,
      score: 1.35
    }
  };

  const rowTypes = [
    'home', 'water', 'water', 'water', 'water', 'bank',
    'road', 'road', 'road', 'road', 'road', 'safe', 'road', 'start'
  ];

  const laneConfig = [
    { row: 1, speed: 58, width: 2.5, gap: 3.3, color: '#9a6338' },
    { row: 2, speed: -75, width: 3.1, gap: 3.5, color: '#bf7842' },
    { row: 3, speed: 93, width: 1.8, gap: 2.8, color: '#8d5832' },
    { row: 4, speed: -53, width: 2.4, gap: 3.2, color: '#c98550' },
    { row: 6, speed: -116, width: 1.45, gap: 3.0, color: '#f05f57' },
    { row: 7, speed: 95, width: 1.65, gap: 3.2, color: '#ffd35a' },
    { row: 8, speed: -142, width: 1.25, gap: 2.8, color: '#55d6ff' },
    { row: 9, speed: 80, width: 2.15, gap: 4.0, color: '#c997ff' },
    { row: 10, speed: -100, width: 1.55, gap: 3.3, color: '#ff8fc7' },
    { row: 12, speed: 132, width: 1.25, gap: 2.9, color: '#f4e66b' }
  ];

  let cell = 48;
  let boardW = 0;
  let boardH = 0;
  let offsetX = 0;
  let offsetY = 0;
  let player = 'ivy';
  let difficulty = 'easy';
  let frog = makeFrog();
  let lanes = [];
  let score = 0;
  let lives = 7;
  let level = 1;
  let running = false;
  let paused = false;
  let lastTime = 0;
  let loopId = 0;
  let homeSlots = [false, false, false, false, false];
  let touchStart = null;

  function makeFrog() {
    return {
      x: Math.floor(cols / 2) + .5,
      y: rows - .5,
      dir: 'up',
      ride: 0,
      blink: 0
    };
  }

  function bestKey() {
    return `ivyAceFroggerBest:${player}:${difficulty}`;
  }

  function getBest() {
    return Number(localStorage.getItem(bestKey()) || 0);
  }

  function saveBest() {
    if (score > getBest()) {
      localStorage.setItem(bestKey(), String(score));
    }
  }

  function updateHud() {
    playerName.textContent = profiles[player].name;
    difficultyName.textContent = difficulties[difficulty].name;
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    bestEl.textContent = Math.max(score, getBest());
  }

  function setOverlay(show, title = '', text = '') {
    overlay.style.display = show ? 'grid' : 'none';
    if (title) overlayTitle.textContent = title;
    if (text) overlayText.textContent = text;
  }

  function points(value) {
    return Math.round(value * difficulties[difficulty].score);
  }

  function resize() {
    const rect = stage.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = `${rect.width}px`;
    canvas.style.height = `${rect.height}px`;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cell = Math.min(rect.width / cols, rect.height / rows);
    boardW = cell * cols;
    boardH = cell * rows;
    offsetX = (rect.width - boardW) / 2;
    offsetY = (rect.height - boardH) / 2;
    draw();
  }

  function buildLanes() {
    const settings = difficulties[difficulty];
    const speedBoost = (1 + (level - 1) * settings.levelSpeed) * settings.speed;
    lanes = laneConfig.map((config, index) => {
      const isWater = config.row <= 4;
      const width = config.width * (isWater ? settings.logWidth : settings.carWidth);
      const gap = config.gap * (isWater ? settings.logGap : settings.roadGap);
      const items = [];
      const total = Math.ceil(cols / gap) + 4;
      for (let i = 0; i < total; i++) {
        const wobble = ((index * 1.7 + i * .9) % 1) * .45;
        items.push({
          x: i * gap + wobble - 2,
          width
        });
      }
      return {
        ...config,
        width,
        gap,
        speed: config.speed * speedBoost,
        items
      };
    });
  }

  function newGame() {
    if (loopId) cancelAnimationFrame(loopId);
    score = 0;
    lives = difficulties[difficulty].lives;
    level = 1;
    homeSlots = [false, false, false, false, false];
    frog = makeFrog();
    buildLanes();
    running = true;
    paused = false;
    lastTime = performance.now();
    startBtn.textContent = 'Restart';
    pauseBtn.textContent = 'Pause';
    setOverlay(false);
    updateHud();
    loopId = requestAnimationFrame(tick);
  }

  function resetFrog() {
    frog = makeFrog();
  }

  function loseLife() {
    if (!running || frog.blink > 0) return;
    lives -= 1;
    frog.blink = difficulty === 'easy' ? 1.05 : .78;
    if (lives <= 0) {
      saveBest();
      running = false;
      setOverlay(true, 'Game Over', `${profiles[player].name} scored ${score}. Press Start to try again.`);
    } else {
      setTimeout(() => {
        resetFrog();
        updateHud();
      }, difficulty === 'easy' ? 680 : 500);
    }
    updateHud();
  }

  function finishHome() {
    const slot = Math.max(0, Math.min(4, Math.floor(frog.x / (cols / 5))));
    if (homeSlots[slot]) {
      score = Math.max(0, score - 10);
      loseLife();
      return;
    }
    homeSlots[slot] = true;
    score += points(100 + Math.max(0, Math.round((rows - frog.y) * 3)));
    if (homeSlots.every(Boolean)) {
      level += 1;
      score += points(250);
      homeSlots = [false, false, false, false, false];
      buildLanes();
      setOverlay(true, `Level ${level}`, `${difficulties[difficulty].name} mode: cars and logs are a little faster now.`);
      setTimeout(() => {
        if (running) setOverlay(false);
      }, 950);
    }
    resetFrog();
    updateHud();
  }

  function move(dir) {
    if (!running) {
      newGame();
      return;
    }
    if (paused || frog.blink > .25) return;
    frog.dir = dir;
    if (dir === 'up') {
      frog.y -= 1;
      score += points(10);
    }
    if (dir === 'down') frog.y += 1;
    if (dir === 'left') frog.x -= 1;
    if (dir === 'right') frog.x += 1;
    frog.x = Math.max(.5, Math.min(cols - .5, frog.x));
    frog.y = Math.max(.5, Math.min(rows - .5, frog.y));
    if (Math.floor(frog.y) === 0) finishHome();
    updateHud();
  }

  function tick(now) {
    const dt = Math.min(.035, (now - lastTime) / 1000 || 0);
    lastTime = now;
    if (running && !paused) update(dt);
    draw();
    if (running) loopId = requestAnimationFrame(tick);
    else loopId = 0;
  }

  function update(dt) {
    frog.ride = 0;
    if (frog.blink > 0) frog.blink -= dt;

    for (const lane of lanes) {
      const distance = lane.speed * dt / cell;
      for (const item of lane.items) {
        item.x += distance;
        const limit = cols + lane.width + 2;
        if (lane.speed > 0 && item.x > limit) item.x -= limit + lane.gap * 2;
        if (lane.speed < 0 && item.x < -lane.width - 2) item.x += limit + lane.gap * 2;
      }
    }

    const row = Math.floor(frog.y);
    const type = rowTypes[row];
    const lane = lanes.find((item) => item.row === row);
    const settings = difficulties[difficulty];

    if (type === 'road' && lane && frog.blink <= 0) {
      const hit = lane.items.some((car) => overlaps(frog.x - settings.carHitbox / 2, settings.carHitbox, car.x + car.width * .08, car.width * .84));
      if (hit) loseLife();
    }

    if (type === 'water' && lane && frog.blink <= 0) {
      const log = lane.items.find((item) => overlaps(frog.x - settings.logCatch / 2, settings.logCatch, item.x - .05, item.width + .1));
      if (!log) {
        loseLife();
      } else {
        frog.ride = lane.speed * dt / cell;
        frog.x += frog.ride;
        if (frog.x < -settings.edgeForgiveness || frog.x > cols + settings.edgeForgiveness) loseLife();
      }
    }
  }

  function overlaps(aX, aW, bX, bW) {
    return aX < bX + bW && aX + aW > bX;
  }

  function boardX(x) {
    return offsetX + x * cell;
  }

  function boardY(y) {
    return offsetY + y * cell;
  }

  function draw() {
    const rect = stage.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    const bg = ctx.createLinearGradient(0, 0, rect.width, rect.height);
    bg.addColorStop(0, '#1d5a31');
    bg.addColorStop(.55, '#153e25');
    bg.addColorStop(1, '#0f2d1c');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, rect.width, rect.height);

    ctx.save();
    ctx.shadowColor = 'rgba(0, 0, 0, .3)';
    ctx.shadowBlur = cell * .35;
    ctx.shadowOffsetY = cell * .1;
    ctx.fillStyle = 'rgba(0, 0, 0, .18)';
    roundRect(offsetX - cell * .12, offsetY - cell * .1, boardW + cell * .24, boardH + cell * .2, cell * .18);
    ctx.fill();
    ctx.restore();

    for (let row = 0; row < rows; row++) {
      drawRow(row);
    }
    drawGridSoft();
    drawHomes();
    for (const lane of lanes) drawLane(lane);
    drawFrog();
  }

  function drawRow(row) {
    const y = boardY(row);
    const type = rowTypes[row];
    const rowGradient = ctx.createLinearGradient(0, y, 0, y + cell);
    if (type === 'water') {
      rowGradient.addColorStop(0, '#257fb4');
      rowGradient.addColorStop(.55, '#166a9c');
      rowGradient.addColorStop(1, '#0f4f7b');
    } else if (type === 'road') {
      rowGradient.addColorStop(0, '#45494f');
      rowGradient.addColorStop(.5, '#30343a');
      rowGradient.addColorStop(1, '#22262c');
    } else if (type === 'home') {
      rowGradient.addColorStop(0, '#3d923f');
      rowGradient.addColorStop(1, '#236d32');
    } else if (type === 'bank' || type === 'safe') {
      rowGradient.addColorStop(0, '#58a943');
      rowGradient.addColorStop(1, '#2d803c');
    } else {
      rowGradient.addColorStop(0, '#75bd4d');
      rowGradient.addColorStop(1, '#45943a');
    }
    ctx.fillStyle = rowGradient;
    ctx.fillRect(offsetX, y, boardW, cell + .5);

    if (type === 'road') {
      ctx.fillStyle = 'rgba(255, 255, 255, .08)';
      ctx.fillRect(offsetX, y, boardW, Math.max(1, cell * .05));
      ctx.fillStyle = 'rgba(0, 0, 0, .18)';
      ctx.fillRect(offsetX, y + cell * .93, boardW, Math.max(1, cell * .07));
      ctx.fillStyle = 'rgba(255, 255, 255, .06)';
      ctx.fillRect(offsetX, y + cell * .1, boardW, Math.max(1, cell * .025));
      ctx.fillStyle = 'rgba(0, 0, 0, .22)';
      for (let i = 0; i < 7; i++) {
        const crackX = offsetX + (((row * 47 + i * 31) % 130) / 130) * boardW;
        const crackY = y + cell * (.18 + ((row * 13 + i * 19) % 56) / 100);
        ctx.beginPath();
        ctx.moveTo(crackX, crackY);
        ctx.lineTo(crackX + cell * .18, crackY + cell * .06);
        ctx.lineTo(crackX + cell * .27, crackY - cell * .01);
        ctx.strokeStyle = 'rgba(0, 0, 0, .24)';
        ctx.lineWidth = Math.max(1, cell * .018);
        ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(255, 236, 150, .62)';
      ctx.setLineDash([cell * .46, cell * .38]);
      ctx.lineWidth = Math.max(1, cell * .04);
      ctx.beginPath();
      ctx.moveTo(offsetX, y + cell * .5);
      ctx.lineTo(offsetX + boardW, y + cell * .5);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    if (type === 'water') {
      ctx.fillStyle = 'rgba(255, 255, 255, .05)';
      ctx.fillRect(offsetX, y + cell * .07, boardW, cell * .08);
      ctx.fillStyle = 'rgba(0, 0, 0, .08)';
      ctx.fillRect(offsetX, y + cell * .78, boardW, cell * .12);
      ctx.strokeStyle = 'rgba(255, 255, 255, .18)';
      ctx.lineWidth = Math.max(1, cell * .025);
      for (let i = 0; i < 3; i++) {
        const waveY = y + cell * (.25 + i * .22);
        ctx.beginPath();
        ctx.moveTo(offsetX, waveY);
        ctx.bezierCurveTo(offsetX + boardW * .18, waveY - cell * .14, offsetX + boardW * .34, waveY + cell * .16, offsetX + boardW * .52, waveY);
        ctx.bezierCurveTo(offsetX + boardW * .7, waveY - cell * .15, offsetX + boardW * .84, waveY + cell * .14, offsetX + boardW, waveY);
        ctx.stroke();
      }
    }

    if (type === 'home' || type === 'bank' || type === 'safe' || type === 'start') {
      ctx.fillStyle = 'rgba(255, 255, 255, .13)';
      for (let i = 0; i < 10; i++) {
        const bladeX = offsetX + (((i * 53 + row * 29) % 130) / 130) * boardW;
        const bladeY = y + cell * (.18 + ((i * 17) % 60) / 100);
        ctx.fillRect(bladeX, bladeY, Math.max(1, cell * .025), cell * .16);
      }
      ctx.fillStyle = 'rgba(30, 54, 32, .34)';
      for (let i = 0; i < 5; i++) {
        const stoneX = offsetX + (((i * 67 + row * 41) % 130) / 130) * boardW;
        const stoneY = y + cell * (.28 + ((i * 23) % 48) / 100);
        ctx.beginPath();
        ctx.ellipse(stoneX, stoneY, cell * .08, cell * .035, .2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    if (type === 'bank' || type === 'safe') {
      ctx.strokeStyle = 'rgba(204, 230, 141, .48)';
      ctx.lineWidth = Math.max(1, cell * .028);
      for (let i = 0; i < 8; i++) {
        const reedX = offsetX + (((row * 37 + i * 19) % 130) / 130) * boardW;
        ctx.beginPath();
        ctx.moveTo(reedX, y + cell * .92);
        ctx.quadraticCurveTo(reedX + cell * .05, y + cell * .62, reedX + cell * .02, y + cell * .38);
        ctx.stroke();
      }
    }
  }

  function drawGridSoft() {
    ctx.strokeStyle = 'rgba(255, 255, 255, .06)';
    ctx.lineWidth = 1;
    for (let col = 1; col < cols; col++) {
      ctx.beginPath();
      ctx.moveTo(boardX(col), offsetY);
      ctx.lineTo(boardX(col), offsetY + boardH);
      ctx.stroke();
    }
  }

  function drawHomes() {
    for (let i = 0; i < 5; i++) {
      const cx = boardX((i + .5) * cols / 5);
      const cy = boardY(.5);
      ctx.fillStyle = 'rgba(0, 0, 0, .18)';
      ctx.beginPath();
      ctx.ellipse(cx + cell * .06, cy + cell * .08, cell * .62, cell * .34, -.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = homeSlots[i] ? '#f4e66b' : '#7bdc55';
      ctx.beginPath();
      ctx.ellipse(cx, cy, cell * .58, cell * .32, -.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = homeSlots[i] ? 'rgba(255, 255, 255, .55)' : 'rgba(17, 70, 25, .38)';
      ctx.lineWidth = Math.max(1, cell * .035);
      ctx.stroke();
      ctx.fillStyle = 'rgba(20, 58, 35, .35)';
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + cell * .44, cy - cell * .2);
      ctx.lineTo(cx + cell * .24, cy + cell * .05);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255, 255, 255, .28)';
      ctx.beginPath();
      ctx.ellipse(cx - cell * .18, cy - cell * .08, cell * .16, cell * .05, -.18, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawLane(lane) {
    for (const item of lane.items) {
      if (lane.row <= 4) drawLog(lane, item);
      else drawCar(lane, item);
    }
  }

  function drawLog(lane, item) {
    const x = boardX(item.x);
    const y = boardY(lane.row) + cell * .18;
    const w = item.width * cell;
    const h = cell * .64;
    ctx.fillStyle = 'rgba(0, 0, 0, .22)';
    roundRect(x + cell * .06, y + cell * .08, w, h, cell * .16);
    ctx.fill();
    const bark = ctx.createLinearGradient(x, y, x, y + h);
    bark.addColorStop(0, '#d19458');
    bark.addColorStop(.38, lane.color);
    bark.addColorStop(1, '#6f3f22');
    ctx.fillStyle = bark;
    roundRect(x, y, w, h, cell * .16);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 255, .18)';
    roundRect(x + cell * .14, y + cell * .12, Math.max(cell * .2, w - cell * .28), h * .16, cell * .08);
    ctx.fill();
    ctx.strokeStyle = 'rgba(64, 30, 14, .42)';
    ctx.lineWidth = Math.max(1, cell * .04);
    ctx.beginPath();
    for (let i = 1; i < 4; i++) {
      const ringX = x + (w * i / 4);
      ctx.moveTo(ringX, y + h * .18);
      ctx.lineTo(ringX - cell * .04, y + h * .82);
    }
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255, 236, 198, .16)';
    ctx.lineWidth = Math.max(1, cell * .025);
    ctx.beginPath();
    ctx.moveTo(x + cell * .18, y + h * .58);
    ctx.bezierCurveTo(x + w * .35, y + h * .42, x + w * .62, y + h * .72, x + w - cell * .18, y + h * .5);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(54, 24, 12, .55)';
    ctx.lineWidth = Math.max(1, cell * .022);
    for (let i = 0; i < 2; i++) {
      const knotX = x + w * (.32 + i * .34);
      const knotY = y + h * (.44 + i * .12);
      ctx.beginPath();
      ctx.ellipse(knotX, knotY, cell * .11, cell * .055, -.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(knotX, knotY, cell * .045, cell * .022, -.2, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawCar(lane, item) {
    const x = boardX(item.x);
    const y = boardY(lane.row) + cell * .19;
    const w = item.width * cell;
    const h = cell * .62;
    ctx.fillStyle = 'rgba(0, 0, 0, .28)';
    roundRect(x + cell * .06, y + cell * .08, w, h, cell * .12);
    ctx.fill();
    const body = ctx.createLinearGradient(x, y, x, y + h);
    body.addColorStop(0, '#ffffff');
    body.addColorStop(.08, lane.color);
    body.addColorStop(.72, lane.color);
    body.addColorStop(1, 'rgba(0, 0, 0, .36)');
    ctx.fillStyle = body;
    roundRect(x, y, w, h, cell * .12);
    ctx.fill();
    ctx.fillStyle = 'rgba(220, 245, 255, .78)';
    roundRect(x + w * .15, y + h * .14, w * .26, h * .26, cell * .05);
    ctx.fill();
    roundRect(x + w * .56, y + h * .14, w * .25, h * .26, cell * .05);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 255, .4)';
    roundRect(x + w * .18, y + h * .18, w * .09, h * .07, cell * .025);
    ctx.fill();
    roundRect(x + w * .59, y + h * .18, w * .09, h * .07, cell * .025);
    ctx.fill();
    ctx.fillStyle = lane.speed > 0 ? '#fff7c2' : '#ff4e4e';
    ctx.fillRect(lane.speed > 0 ? x + w - cell * .08 : x, y + h * .28, cell * .08, h * .14);
    ctx.fillRect(lane.speed > 0 ? x + w - cell * .08 : x, y + h * .58, cell * .08, h * .14);
    ctx.fillStyle = lane.speed > 0 ? '#ff4e4e' : '#fff7c2';
    ctx.fillRect(lane.speed > 0 ? x : x + w - cell * .08, y + h * .3, cell * .08, h * .12);
    ctx.fillRect(lane.speed > 0 ? x : x + w - cell * .08, y + h * .58, cell * .08, h * .12);
    ctx.fillStyle = 'rgba(0, 0, 0, .22)';
    roundRect(lane.speed > 0 ? x + w * .82 : x + w * .06, y + h * .44, w * .12, h * .15, cell * .025);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 255, .32)';
    ctx.fillRect(x + w * .1, y + h * .07, w * .8, Math.max(1, h * .035));
    ctx.fillStyle = '#181b20';
    ctx.beginPath();
    ctx.arc(x + w * .22, y + h * .9, cell * .1, 0, Math.PI * 2);
    ctx.arc(x + w * .78, y + h * .9, cell * .1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6f7680';
    ctx.beginPath();
    ctx.arc(x + w * .22, y + h * .9, cell * .045, 0, Math.PI * 2);
    ctx.arc(x + w * .78, y + h * .9, cell * .045, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawFrog() {
    const profile = profiles[player];
    const flash = frog.blink > 0 && Math.floor(frog.blink * 14) % 2 === 0;
    if (flash) return;
    const cx = boardX(frog.x);
    const cy = boardY(frog.y);
    const r = cell * .28;

    ctx.save();
    ctx.translate(cx, cy);
    if (frog.dir === 'right') ctx.rotate(Math.PI / 2);
    if (frog.dir === 'down') ctx.rotate(Math.PI);
    if (frog.dir === 'left') ctx.rotate(-Math.PI / 2);

    ctx.fillStyle = 'rgba(0, 0, 0, .24)';
    ctx.beginPath();
    ctx.ellipse(cell * .05, cell * .11, r * 1.1, r * .72, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = profile.body;
    ctx.beginPath();
    ctx.ellipse(-r * .85, r * .42, r * .34, r * .2, -.7, 0, Math.PI * 2);
    ctx.ellipse(r * .85, r * .42, r * .34, r * .2, .7, 0, Math.PI * 2);
    ctx.ellipse(-r * .78, -r * .08, r * .32, r * .18, .65, 0, Math.PI * 2);
    ctx.ellipse(r * .78, -r * .08, r * .32, r * .18, -.65, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = profile.body;
    ctx.beginPath();
    ctx.ellipse(0, cell * .03, r * .92, r * 1.08, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 255, .28)';
    ctx.beginPath();
    ctx.ellipse(-r * .28, -r * .24, r * .28, r * .14, -.55, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = profile.belly;
    ctx.beginPath();
    ctx.ellipse(0, cell * .08, r * .48, r * .58, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = profile.stripe;
    ctx.lineWidth = Math.max(1, cell * .025);
    ctx.beginPath();
    ctx.moveTo(-r * .36, r * .08);
    ctx.bezierCurveTo(-r * .1, r * .22, r * .1, r * .22, r * .36, r * .08);
    ctx.stroke();

    ctx.fillStyle = profile.body;
    ctx.beginPath();
    ctx.arc(-r * .62, -r * .62, r * .42, 0, Math.PI * 2);
    ctx.arc(r * .62, -r * .62, r * .42, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#102413';
    ctx.beginPath();
    ctx.arc(-r * .62, -r * .65, r * .13, 0, Math.PI * 2);
    ctx.arc(r * .62, -r * .65, r * .13, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = profile.cheek;
    ctx.beginPath();
    ctx.arc(-r * .68, -r * .18, r * .12, 0, Math.PI * 2);
    ctx.arc(r * .68, -r * .18, r * .12, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#102413';
    ctx.lineWidth = Math.max(1, cell * .035);
    ctx.beginPath();
    ctx.arc(0, -r * .25, r * .38, .2, Math.PI - .2);
    ctx.stroke();

    ctx.restore();
  }

  function roundRect(x, y, width, height, radius) {
    const r = Math.min(radius, Math.abs(width) / 2, Math.abs(height) / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + width - r, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + r);
    ctx.lineTo(x + width, y + height - r);
    ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
    ctx.lineTo(x + r, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  startBtn.addEventListener('click', newGame);

  pauseBtn.addEventListener('click', () => {
    if (!running) return;
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    setOverlay(paused, 'Paused', 'Press Resume or keep hopping when you are ready.');
    if (!paused) {
      lastTime = performance.now();
    }
  });

  playerButtons.forEach((button) => {
    button.addEventListener('click', () => {
      player = button.dataset.player;
      playerButtons.forEach((item) => item.classList.toggle('active', item === button));
      resetFrog();
      updateHud();
      draw();
    });
  });

  difficultyButtons.forEach((button) => {
    button.addEventListener('click', () => {
      difficulty = button.dataset.difficulty;
      difficultyButtons.forEach((item) => item.classList.toggle('active', item === button));
      if (running) {
        newGame();
      } else {
        lives = difficulties[difficulty].lives;
        buildLanes();
        resetFrog();
        updateHud();
        draw();
      }
    });
  });

  document.querySelectorAll('[data-move]').forEach((button) => {
    button.addEventListener('click', () => move(button.dataset.move));
  });

  window.addEventListener('keydown', (event) => {
    const keyMap = {
      ArrowUp: 'up',
      ArrowDown: 'down',
      ArrowLeft: 'left',
      ArrowRight: 'right',
      w: 'up',
      s: 'down',
      a: 'left',
      d: 'right',
      W: 'up',
      S: 'down',
      A: 'left',
      D: 'right'
    };
    if (keyMap[event.key]) {
      event.preventDefault();
      move(keyMap[event.key]);
    }
    if (event.key === ' ') {
      event.preventDefault();
      if (!running) newGame();
    }
  });

  stage.addEventListener('pointerdown', (event) => {
    touchStart = { x: event.clientX, y: event.clientY };
  });

  stage.addEventListener('pointerup', (event) => {
    if (!touchStart) return;
    const dx = event.clientX - touchStart.x;
    const dy = event.clientY - touchStart.y;
    touchStart = null;
    if (Math.hypot(dx, dy) < 18) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  });

  window.addEventListener('resize', resize);

  buildLanes();
  updateHud();
  resize();
})();
</script>
</body>
</html>
